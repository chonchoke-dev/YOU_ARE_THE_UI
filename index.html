<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Button That Could</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf3;
            --text-color: #2c3e50;
            --accent-color: #ff6b6b;
            --goal-color: #4ecdc4;
            --obstacle-color: #5d5c61;
            --button-shadow: #d4a373;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Gaegu', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Give it a slight paper texture */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0,0,0,0.01) 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(0,0,0,0.01) 0%, transparent 30%);
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
            max-width: 600px;
            max-height: 800px;
            background: rgba(255, 255, 255, 0.5);
            border: 3px solid #dbd8cc;
            border-radius: 40px 15px 35px 20px;
            box-shadow: 10px 10px 0px #eee6d8;
            margin: 10px;
            overflow: hidden;
        }

        /* The Draggable Button */
        #player-button {
            position: absolute;
            width: 90px;
            height: 50px;
            background-color: var(--accent-color);
            color: white;
            border: 3px solid #2c3e50;
            border-radius: 12px 8px 14px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: grab;
            z-index: 10;
            touch-action: none; /* Crucial for touch dragging */
            box-shadow: 4px 4px 0px #2c3e50;
            transition: transform 0.1s ease;
            transform: rotate(-2deg);
        }

        #player-button:active {
            cursor: grabbing;
            transform: scale(1.05) rotate(1deg);
            box-shadow: 2px 2px 0px #2c3e50;
        }

        /* The Goal Area */
        #goal-area {
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: var(--goal-color);
            border: 4px dashed #2c3e50;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            text-align: center;
            opacity: 0.8;
            bottom: 40px;
            right: 40px;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .invincible {
            animation: flash 0.2s infinite;
            pointer-events: none; /* Optional: skip collisions visually too */
        }

        /* The Obstacle */
        .obstacle {
            position: absolute;
            background-color: #5d5c61;
            border: 3px solid #2c3e50;
            border-radius: 5px 15px 3px 12px;
            z-index: 10;
        }

        /* Game Over / Clear Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253, 250, 243, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes pulse-red {
            0%, 100% { color: #2c3e50; }
            50% { color: #ff4757; transform: scale(1.1); }
        }

        #obstacles-container, #items-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #ui-top {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            pointer-events: none;
            z-index: 20;
        }

        .ui-label {
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(255,255,255,0.7);
            padding: 5px 15px;
            border: 2px solid #2c3e50;
            border-radius: 10px 5px 12px 6px;
        }

        #timer-container {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 12px;
            background: #eee;
            border: 2px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            z-index: 20;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--goal-color);
            transition: width 0.1s linear, background-color 0.3s;
        }

        .timer-low {
            background-color: #ff4757 !important;
            animation: shake 0.5s infinite;
        }

        .timer-text-low {
            animation: pulse-red 0.5s infinite;
        }

        /* Power-ups & Juice */
        .item {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid #2c3e50;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            z-index: 5;
            animation: itemPulse 1s infinite alternate;
        }

        @keyframes itemPulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.2); }
        }

        .player-trail {
            position: absolute;
            background: var(--accent-color);
            opacity: 0.3;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9;
        }

        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(255, 71, 87, 0);
            pointer-events: none;
            z-index: 50;
            transition: box-shadow 0.3s;
        }

        .stars-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .star {
            font-size: 2.5rem;
            color: #ccc;
            transform: scale(0.5);
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .star.filled {
            color: #f1c40f;
            transform: scale(1);
        }

        #shield-aura {
            position: absolute;
            width: 110%;
            height: 120%;
            border: 4px solid #3498db;
            border-radius: 15px;
            box-shadow: 0 0 15px #3498db;
            display: none;
            pointer-events: none;
            animation: breathe 2s infinite;
        }

        .overlay h2 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .restart-btn {
            font-family: 'Patrick Hand', cursive;
            padding: 12px 30px;
            font-size: 1.5rem;
            background: #fff;
            border: 3px solid #2c3e50;
            border-radius: 10px 20px 8px 15px;
            cursor: pointer;
            box-shadow: 5px 5px 0 #2c3e50;
            transition: 0.2s;
        }

        .restart-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 #2c3e50;
        }

        .restart-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #2c3e50;
        }

        /* Instructions */
        #instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        #instructions h1 {
            margin: 0;
            font-size: 2rem;
            text-decoration: underline wavy #ff6b6b;
        }

        #instructions p {
            margin: 5px 0;
            font-size: 1.1rem;
            opacity: 0.7;
        }

        /* Animations for Dragging */
        .wobble {
            animation: wobbleAnim 0.3s infinite linear;
        }

        @keyframes wobbleAnim {
            0% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
            100% { transform: rotate(-2deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="vignette"></div>
        <div id="ui-top">
            <div id="level-indicator" class="ui-label">LVL 1</div>
            <div id="score-display" class="ui-label">SCORE: 000</div>
        </div>

        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>

        <div id="instructions" style="top: 100px;">
            <h1>The Button That Could</h1>
            <p id="best-score-label">Best: 0</p>
        </div>

        <div id="obstacles-container"></div>
        <div id="items-container"></div>

        <div id="goal-area">
            <div>GOAL!</div>
        </div>

        <div id="player-button">
            START
            <div id="shield-aura"></div>
        </div>

        <!-- Overlays -->
        <div id="game-over" class="overlay">
            <h2 id="over-title" style="color: #ff4757;">OOPS!</h2>
            <p id="game-over-msg" style="font-size: 1.5rem; margin-bottom: 2rem;">You hit the wall...</p>
            <button class="restart-btn" onclick="restartGame()">Try Again?</button>
        </div>

        <div id="game-clear" class="overlay">
            <h1 id="clear-title" style="color: #2ed573; font-size: 3rem;">YAY!</h1>
            <div class="stars-container">
                <span id="star-1" class="star">★</span>
                <span id="star-2" class="star">★</span>
                <span id="star-3" class="star">★</span>
            </div>
            <p id="game-clear-msg" style="font-size: 1.5rem; margin-bottom: 1rem;">Level Complete!</p>
            <p id="level-score-msg" style="font-size: 1.2rem; margin-bottom: 2rem;"></p>
            <div style="display: flex; gap: 10px;">
                <button id="next-level-btn" class="restart-btn" onclick="nextLevel()">Next Level</button>
                <button id="final-restart-btn" class="restart-btn" style="display: none;" onclick="resetToLevelOne()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player-button');
        const obstaclesContainer = document.getElementById('obstacles-container');
        const itemsContainer = document.getElementById('items-container');
        const goal = document.getElementById('goal-area');
        const container = document.getElementById('game-container');
        const gameOverOverlay = document.getElementById('game-over');
        const gameClearOverlay = document.getElementById('game-clear');
        const levelIndicator = document.getElementById('level-indicator');
        const scoreDisplay = document.getElementById('score-display');
        const timerBar = document.getElementById('timer-bar');
        const bestScoreLabel = document.getElementById('best-score-label');
        const shieldAura = document.getElementById('shield-aura');
        const vignette = document.getElementById('vignette');

        let isDragging = false;
        let isGameOver = false;
        let currentLevel = 1;
        let score = 0;
        let bestScore = 0;
        let bestLevel = 1;
        let timeLeft = 15;
        let totalTime = 15;
        let invincibleTime = 0;
        let startX, startY;
        let obstacles = [];
        let items = [];
        let trailDots = [];
        let hasShield = false;
        let animationFrameId;
        let lastTime = 0;

        // Procedural Level Generator
        function generateLevel(n) {
            const time = Math.max(7, 15 - Math.floor(n / 8));
            const obsCount = 2 + Math.floor(n / 3); // More obstacles earlier
            const speedBase = 1.0 + (n * 0.15);
            const obs = [];
            const itemsList = [];

            const playerSpawnX = 10;
            const playerSpawnY = 10;

            for (let i = 0; i < obsCount; i++) {
                const typeRoll = Math.random();
                let type = 'static';
                // More variety earlier
                if (n >= 1 && typeRoll > 0.6) type = 'spinning';
                if (n >= 2 && typeRoll > 0.8) type = 'moving';
                if (n >= 4 && typeRoll > 0.9) type = 'homing';

                // Ensure distance from player spawn (10, 10)
                let x, y;
                let attempts = 0;
                do {
                    x = 10 + Math.random() * 80;
                    y = 10 + Math.random() * 80;
                    attempts++;
                } while (Math.hypot(x - playerSpawnX, y - playerSpawnY) < 25 && attempts < 20);

                obs.push({
                    x: x,
                    y: y,
                    w: 40 + Math.random() * 120,
                    h: 15 + Math.random() * 40,
                    rot: Math.random() * 360,
                    type: type,
                    speed: (Math.random() > 0.5 ? 1 : -1) * (speedBase * (0.8 + Math.random() * 0.6)),
                    range: 150 + Math.random() * 250
                });
            }

            // Power-ups
            if (Math.random() > 0.4) {
                const itemTypes = ['time', 'diamond'];
                if (n > 2) itemTypes.push('shield');
                itemsList.push({
                    x: playerSpawnX + 15 + Math.random() * 60,
                    y: playerSpawnY + 15 + Math.random() * 60,
                    type: itemTypes[Math.floor(Math.random() * itemTypes.length)]
                });
            }

            return { t: time, obs, items: itemsList };
        }

        function createObstacles() {
            obstaclesContainer.innerHTML = '';
            obstacles = [];
            const config = generateLevel(currentLevel);
            totalTime = config.t;
            timeLeft = config.t;
            
            config.obs.forEach(obs => {
                const el = document.createElement('div');
                el.className = 'obstacle';
                el.style.width = obs.w + 'px';
                el.style.height = obs.h + 'px';
                el.style.left = obs.x + '%';
                el.style.top = obs.y + '%';
                el.style.transform = `translate(-50%, -50%) rotate(${obs.rot || 0}deg)`;
                obstaclesContainer.appendChild(el);
                obstacles.push({ el, config: obs, currentRot: obs.rot || 0, x: obs.x, y: obs.y, currentPos: 0, dir: 1 });
            });

            createItems(config.items);
        }

        function createItems(itemsData) {
            itemsContainer.innerHTML = '';
            items = [];
            itemsData.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item';
                el.style.left = item.x + '%';
                el.style.top = item.y + '%';
                el.style.backgroundColor = item.type === 'shield' ? '#3498db' : item.type === 'time' ? '#2ecc71' : '#f1c40f';
                el.innerText = item.type === 'shield' ? '🛡️' : item.type === 'time' ? '⏳' : '💎';
                itemsContainer.appendChild(el);
                items.push({ el, type: item.type });
            });
        }

        function update(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (!isGameOver) {
                if (invincibleTime > 0) {
                    invincibleTime -= delta;
                    if (invincibleTime <= 0) {
                        player.classList.remove('invincible');
                    }
                }

                if (isDragging) {
                    timeLeft -= delta;
                    if (timeLeft <= 0) endGame('timeout');
                    updateTimerUI();
                    createTrail();
                }

                updateObstacles();
                updateItems();
                updateVignette();
                updateTrail();

                animationFrameId = requestAnimationFrame(update);
            }
        }

        function updateObstacles() {
            const playerRect = player.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const pX = ( (playerRect.left + playerRect.width/2) - containerRect.left ) / containerRect.width * 100;
            const pY = ( (playerRect.top + playerRect.height/2) - containerRect.top ) / containerRect.height * 100;

            obstacles.forEach(obs => {
                if (obs.config.type === 'spinning') {
                    obs.currentRot += obs.config.speed;
                    obs.el.style.transform = `translate(-50%, -50%) rotate(${obs.currentRot}deg)`;
                } else if (obs.config.type === 'moving') {
                    obs.currentPos += obs.config.speed * obs.dir;
                    if (Math.abs(obs.currentPos) > obs.config.range / 2) obs.dir *= -1;
                    obs.el.style.left = `calc(${obs.config.x}% + ${obs.currentPos}px)`;
                } else if (obs.config.type === 'homing') {
                    const dx = pX - obs.x;
                    const dy = pY - obs.y;
                    const angle = Math.atan2(dy, dx);
                    obs.x += Math.cos(angle) * obs.config.speed * 0.5;
                    obs.y += Math.sin(angle) * obs.config.speed * 0.5;
                    obs.el.style.left = obs.x + '%';
                    obs.el.style.top = obs.y + '%';
                }
            });
            if (invincibleTime <= 0) checkCollision();
        }

        function updateItems() {
            const playerRect = player.getBoundingClientRect();
            items.forEach((item, index) => {
                const itemRect = item.el.getBoundingClientRect();
                if (
                    playerRect.left < itemRect.right && playerRect.right > itemRect.left &&
                    playerRect.top < itemRect.bottom && playerRect.bottom > itemRect.top
                ) {
                    applyPowerUp(item.type);
                    item.el.remove();
                    items.splice(index, 1);
                }
            });
        }

        function applyPowerUp(type) {
            container.style.animation = 'shake 0.2s';
            setTimeout(() => container.style.animation = '', 200);
            if (type === 'shield') {
                hasShield = true;
                shieldAura.style.display = 'block';
            } else if (type === 'time') {
                timeLeft = Math.min(totalTime, timeLeft + 4);
            } else if (type === 'diamond') {
                score += 1000;
                scoreDisplay.innerText = `SCORE: ${Math.floor(score)}`;
            }
        }

        function createTrail() {
            const dot = document.createElement('div');
            dot.className = 'player-trail';
            dot.style.left = player.offsetLeft + player.offsetWidth/2 - 10 + 'px';
            dot.style.top = player.offsetTop + player.offsetHeight/2 - 10 + 'px';
            dot.style.width = '20px';
            dot.style.height = '20px';
            container.appendChild(dot);
            trailDots.push({ el: dot, life: 1.0 });
        }

        function updateTrail() {
            trailDots.forEach((dot, index) => {
                dot.life -= 0.05;
                dot.el.style.opacity = dot.life * 0.3;
                dot.el.style.transform = `scale(${dot.life})`;
                if (dot.life <= 0) {
                    dot.el.remove();
                    trailDots.splice(index, 1);
                }
            });
        }

        function updateVignette() {
            const perc = (timeLeft / totalTime);
            if (perc < 0.4) {
                const intensity = (0.4 - perc) * 250;
                vignette.style.boxShadow = `inset 0 0 ${intensity}px rgba(255, 71, 87, 0.7)`;
            } else {
                vignette.style.boxShadow = `inset 0 0 100px rgba(255, 71, 87, 0)`;
            }
        }

        function updateTimerUI() {
            const percentage = (timeLeft / totalTime) * 100;
            timerBar.style.width = `${percentage}%`;
            if (percentage < 30) timerBar.classList.add('timer-low');
            else timerBar.classList.remove('timer-low');
        }

        function init() {
            isGameOver = false;
            hasShield = false;
            invincibleTime = 1.5; // Longer grace period
            player.classList.add('invincible');
            shieldAura.style.display = 'none';
            gameOverOverlay.style.display = 'none';
            gameClearOverlay.style.display = 'none';
            levelIndicator.innerText = `LVL ${currentLevel}`;
            scoreDisplay.innerText = `SCORE: ${Math.floor(score)}`;
            
            // Background shift
            const hue = (currentLevel * 40) % 360;
            container.style.backgroundColor = `hsl(${hue}, 30%, 95%)`;

            // Reset player position FIRST
            player.style.left = '10%';
            player.style.top = '10%';
            player.style.backgroundColor = 'var(--accent-color)';
            player.style.color = 'white';
            player.style.boxShadow = '4px 4px 0px #2c3e50';
            player.classList.remove('wobble');

            createObstacles();
            updateTimerUI();

            trailDots.forEach(d => d.el.remove());
            trailDots = [];

            lastTime = 0;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(update);

            document.getElementById('next-level-btn').style.display = 'block';
            document.getElementById('final-restart-btn').style.display = 'none';
        }

        function checkCollision() {
            const playerRect = player.getBoundingClientRect();
            const goalRect = goal.getBoundingClientRect();

            for (let obs of obstacles) {
                const obsRect = obs.el.getBoundingClientRect();
                if (
                    playerRect.left < obsRect.right && playerRect.right > obsRect.left &&
                    playerRect.top < obsRect.bottom && playerRect.bottom > obsRect.top
                ) {
                    if (hasShield) {
                        hasShield = false;
                        shieldAura.style.display = 'none';
                        container.style.animation = 'shake 0.4s';
                        setTimeout(() => container.style.animation = '', 400);
                        obs.x -= 10; // Bump obstacle away
                        return;
                    }
                    endGame('over');
                    return;
                }
            }

            const playerCenterX = playerRect.left + playerRect.width / 2;
            const playerCenterY = playerRect.top + playerRect.height / 2;
            if (playerCenterX > goalRect.left && playerCenterX < goalRect.right &&
                playerCenterY > goalRect.top && playerCenterY < goalRect.bottom) {
                endGame('clear');
            }
        }

        function endGame(type) {
            isGameOver = true;
            isDragging = false;
            player.classList.remove('wobble');
            player.classList.remove('invincible');
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            if (type === 'over' || type === 'timeout') {
                gameOverOverlay.style.display = 'flex';
                document.getElementById('over-title').innerText = type === 'over' ? "CRASH!" : "TIME UP!";
                document.getElementById('game-over-msg').innerHTML = `The run ended at <b>LVL ${currentLevel}</b>.<br>Total Score: ${Math.floor(score)}`;
                container.style.animation = 'shake 0.4s';
            } else {
                gameClearOverlay.style.display = 'flex';
                showStars();
                const levelPoints = Math.floor(timeLeft * 20 * (1 + currentLevel/10));
                score += levelPoints;
                document.getElementById('level-score-msg').innerText = `+${levelPoints} Points`;
                scoreDisplay.innerText = `SCORE: ${Math.floor(score)}`;
                
                if (currentLevel > bestLevel) {
                    bestLevel = currentLevel;
                    bestScoreLabel.innerText = `Record: LVL ${bestLevel}`;
                }

                player.style.boxShadow = '0 0 30px var(--goal-color)';
                player.style.backgroundColor = '#fff';
                player.style.color = '#4ecdc4';
                
                spawnParticles();
            }
        }

        function spawnParticles() {
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.style.position = 'absolute';
                p.style.width = '12px';
                p.style.height = '12px';
                p.style.backgroundColor = i % 2 === 0 ? '#4ecdc4' : '#f1c40f';
                p.style.borderRadius = '2px';
                p.style.left = player.style.left;
                p.style.top = player.style.top;
                p.style.zIndex = '50';
                p.style.transition = 'all 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28)';
                container.appendChild(p);
                setTimeout(() => {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 150 + Math.random() * 250;
                    p.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) rotate(${Math.random()*360}deg) scale(0)`;
                    p.style.opacity = '0';
                }, 10);
                setTimeout(() => p.remove(), 800);
            }
        }

        function showStars() {
            const perc = (timeLeft / totalTime);
            document.querySelectorAll('.star').forEach(s => s.classList.remove('filled'));
            setTimeout(() => document.getElementById('star-1').classList.add('filled'), 200);
            if (perc > 0.4) setTimeout(() => document.getElementById('star-2').classList.add('filled'), 400);
            if (perc > 0.7) setTimeout(() => document.getElementById('star-3').classList.add('filled'), 600);
        }

        player.addEventListener('pointerdown', (e) => {
            if (isGameOver) return;
            isDragging = true;
            player.setPointerCapture(e.pointerId);
            player.classList.add('wobble');
            const rect = player.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || isGameOver) return;
            const containerRect = container.getBoundingClientRect();
            let x = e.clientX - containerRect.left - startX;
            let y = e.clientY - containerRect.top - startY;
            const maxX = containerRect.width - player.offsetWidth;
            const maxY = containerRect.height - player.offsetHeight;
            x = Math.max(0, Math.min(x, maxX));
            y = Math.max(0, Math.min(y, maxY));
            player.style.left = `${x}px`;
            player.style.top = `${y}px`;
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            player.classList.remove('wobble');
        });

        function restartGame() { currentLevel = 1; score = 0; init(); }
        function nextLevel() { currentLevel++; init(); }
        function resetToLevelOne() { restartGame(); }

        window.onload = init;
    </script>
</body>
</html>
